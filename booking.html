        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">
    SwiftBus Botswana
</a>

<button
    class="navbar-toggler"
    type="button"
    data-bs-toggle="collapse"
    data-bs-target="#navbarNav"
>
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">

</li>

</ul>

<button
    id="theme-toggle"
    class="btn btn-outline-light ms-3"
>
Dark Mode
</button>

</div>
</div>
</nav>

</header>

<!-- HERO SECTION -->

<section class="bg-success text-white text-center py-5">

<div class="container">

<h1 class="display-4 fw-bold">
Book Your Bus Ticket
</h1>

<p class="lead">
Fast • Safe • Comfortable Travel Across Botswana
</p>

</div>

</section>

<!-- BOOKING FORM -->

<main class="container my-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body p-5">

<h2 class="mb-4 text-center">
Online Booking Form
</h2>

<form>

<!-- FULL NAME -->

<div class="mb-3">
<label class="form-label">
Full Name
</label>

<input
    type="text"
    class="form-control"
    placeholder="Enter your full name"
    required
>
</div>

<!-- EMAIL -->

<div class="mb-3">
<label class="form-label">
Email Address
</label>

<input
    type="email"
    class="form-control"
    placeholder="example@email.com"
    required
>
</div>

<!-- PHONE -->

<div class="mb-3">
<label class="form-label">
Phone Number
</label>

<input
    type="tel"
    class="form-control"
    placeholder="+267 71234567"
    required
>
</div>

<!-- ROUTE -->

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Departure
</label>

<select class="form-select" required>

<option value="">
Choose Departure
</option>

<option>Gaborone</option>
<option>Francistown</option>
<option>Maun</option>
<option>Kasane</option>
<option>Jwaneng</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Destination
</label>

<select class="form-select" required>

<option value="">
Choose Destination
</option>

<option>Gaborone</option>
<option>Francistown</option>
<option>Maun</option>
<option>Kasane</option>
<option>Jwaneng</option>

</select>

</div>

</div>

<!-- DATE -->

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Travel Date
</label>

<input
    type="date"
    class="form-control"
    required
>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Passengers
</label>

<input
    type="number"
    class="form-control"
    min="1"
    max="10"
    value="1"
    required
>

</div>

</div>

<!-- SEAT -->

<div class="mb-3">

<label class="form-label">
Seat Preference
</label>

<select class="form-select">

<option>Window Seat</option>
<option>Aisle Seat</option>
<option>Front Seat</option>
<option>Back Seat</option>

</select>

</div>

<!-- MESSAGE -->

<div class="mb-3">

<label class="form-label">
Special Requests
</label>

<textarea
    class="form-control"
    rows="4"
    placeholder="Any special requests?"
></textarea>

</div>

<!-- TERMS -->

<div class="form-check mb-4">

<input
    class="form-check-input"
    type="checkbox"
    required
>

<label class="form-check-label">
I agree to the booking terms and conditions
</label>

</div>

<!-- BUTTON -->

<div class="d-grid">

<button
    type="submit"
    class="btn btn-success btn-lg"
>
Confirm Booking
</button>

</div>

</form>

</div>
</div>
</div>
</div>

</main>

<!-- FOOTER -->

<footer>

All Rights Reserved.
</p>

</footer>

↑
</button>

</body>
